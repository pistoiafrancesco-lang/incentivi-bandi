name: Scraper Incentivi Giornaliero

on:
  schedule:
    - cron: '0 6 * * *'   # ogni giorno alle 06:00 UTC (08:00 ora italiana)
  workflow_dispatch:        # permette avvio manuale dal sito GitHub

jobs:
  scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install requests

      - name: Esegui scraper
        run: python incentivi_scraper.py

      - name: Commit e push dei file output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add incentivi_*.json incentivi_*.csv
          git diff --cached --quiet || git commit -m "Update bandi $(date +'%Y-%m-%d')"
          git push
